# Nginx site config for the Student Document Tracking System.
# Place at /etc/nginx/sites-available/student-docs and symlink into sites-enabled.
# Serves the built React SPA and reverse-proxies /api to the Express backend.

server {
    listen 80;
    server_name your-domain.com;            # <-- change to your domain or server IP

    # Allow uploads slightly larger than the app's 10MB limit (headroom).
    client_max_body_size 12M;

    # Gzip for the static bundle.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Built frontend (frontend/dist copied/located here).
    root /var/www/student-docs;
    index index.html;

    # API → Express backend on localhost:4000
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback — let React Router handle client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets aggressively.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# For HTTPS, run: sudo certbot --nginx -d your-domain.com
# Certbot will rewrite this server block to listen on 443 with your certificate.
